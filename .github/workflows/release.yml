name: Release

# 推送 v* 形式的 tag 时：
#   1. 构建 Python wheel/sdist
#   2. 构建 macOS (.dmg) 与 Windows (.exe/.msi) 桌面安装包
#      （Tauri 外壳 + PyInstaller 打包的 Python sidecar，用户无需自带 Python）
#   3. 汇总所有产物到同一个 GitHub Release
#
# 用法：
#   git tag v0.1.4
#   git push origin v0.1.4

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write   # softprops/action-gh-release 需要创建 Release 与上传资产

jobs:
  build:
    name: Build Python package
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Build wheel and sdist
        run: python -m build

      - name: Verify metadata
        run: python -m twine check dist/*

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-dist
          path: dist/*

  desktop:
    name: Build desktop app (${{ matrix.name }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            name: macos
          - os: windows-latest
            name: windows
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            frontend/src-tauri/target
          key: cargo-${{ matrix.os }}-${{ hashFiles('frontend/src-tauri/Cargo.lock') }}
          restore-keys: cargo-${{ matrix.os }}-

      - name: Build Python sidecar (macOS)
        if: matrix.os == 'macos-latest'
        run: bash scripts/build_sidecar.sh

      - name: Build Python sidecar (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: pwsh scripts/build_sidecar.ps1

      - name: Install frontend deps
        working-directory: frontend
        run: npm install

      - name: Build Tauri app
        working-directory: frontend
        run: npm run tauri build

      - name: Locate bundles (macOS)
        if: matrix.os == 'macos-latest'
        id: mac-bundles
        run: |
          mkdir -p staging
          cp frontend/src-tauri/target/release/bundle/dmg/*.dmg staging/ 2>/dev/null || true
          ls -la staging
          echo "path=staging" >> "$GITHUB_OUTPUT"

      - name: Locate bundles (Windows)
        if: matrix.os == 'windows-latest'
        id: win-bundles
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path staging | Out-Null
          $nsis = Get-ChildItem -Path frontend/src-tauri/target/release/bundle/nsis/*.exe -ErrorAction SilentlyContinue
          $msi  = Get-ChildItem -Path frontend/src-tauri/target/release/bundle/msi/*.msi -ErrorAction SilentlyContinue
          if ($nsis) { Copy-Item $nsis.FullName -Destination staging }
          if ($msi)  { Copy-Item $msi.FullName  -Destination staging }
          Get-ChildItem staging
          "path=staging" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Upload desktop artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.name }}
          path: staging/*

  release:
    name: Publish GitHub Release
    needs: [build, desktop]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Python dist
        uses: actions/download-artifact@v4
        with:
          name: python-dist
          path: dist

      - name: Download macOS bundle
        uses: actions/download-artifact@v4
        with:
          name: desktop-macos
          path: desktop-macos

      - name: Download Windows bundle
        uses: actions/download-artifact@v4
        with:
          name: desktop-windows
          path: desktop-windows

      - name: Gather release files
        run: |
          mkdir -p release
          cp dist/* release/ 2>/dev/null || true
          cp desktop-macos/* release/ 2>/dev/null || true
          cp desktop-windows/* release/ 2>/dev/null || true
          ls -la release

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release/*.whl
            release/*.tar.gz
            release/*.dmg
            release/*.exe
            release/*.msi
